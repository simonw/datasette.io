databases:
  content:
    queries:
      feed:
        title: Datasette News and Blog
        sql: |-
          with feed_items as (
            select
              'tag:datasette.io,' || date as atom_id,
              'Datasette News: ' || date as atom_title,
              date || 'T00:00:00-08:00' as atom_updated,
              'https://datasette.io/news/' || date as atom_link,
              render_markdown(group_concat(body, char(10) || char(10))) as atom_content_html,
              'Simon Willison' as atom_author_name,
              'https://simonwillison.net/' as atom_author_uri,
              date || 'T00:00:00' as sort_datetime
            from
              news
            group by
              date
            union all
            select
              'tag:datasette.io,' || trim(path, '/') as atom_id,
              title as atom_title,
              replace(datetime_utc, ' ', 'T') || 'Z' as atom_updated,
              'https://datasette.io' || path as atom_link,
              html as atom_content_html,
              author as atom_author_name,
              author_url as atom_author_uri,
              datetime_utc as sort_datetime
            from
              blog_posts
          )
          select
            atom_id,
            atom_title,
            atom_updated,
            atom_link,
            atom_content_html,
            atom_author_name,
            atom_author_uri
          from
            feed_items
          order by
            sort_datetime desc
          limit
            20
  global-power-plants:
    tables:
      global-power-plants:
        facets: ["country_long", "owner", "primary_fuel"]
plugins:
  dogsheep-beta:
    database: dogsheep-index
    config_file: templates/dogsheep-beta.yml
    template_debug: true
  datasette-turnstile:
    site_key:
      $env: TURNSTILE_SITE_KEY
    secret_key:
      $env: TURNSTILE_SECRET_KEY
    # Protect expensive crawler-shaped URLs while keeping normal demo pages open.
    protected_paths:
      # Arbitrary SQL on the public demo databases
      - "/legislators?sql=*"
      - "/legislators.json?sql=*"
      - "/global-power-plants?sql=*"
      - "/global-power-plants.json?sql=*"

      # Multi-parameter table/API URLs on the public demo databases
      - "/legislators/*?*&*"
      - "/legislators/*.json?*&*"
      - "/global-power-plants/*?*&*"
      - "/global-power-plants/*.json?*&*"

      # Arbitrary SQL on the other database areas
      - "/content?sql=*"
      - "/content.json?sql=*"
      - "/docs-index?sql=*"
      - "/docs-index.json?sql=*"
      - "/dogsheep-index?sql=*"
      - "/dogsheep-index.json?sql=*"
      - "/simon-blog?sql=*"
      - "/simon-blog.json?sql=*"
      - "/tils?sql=*"
      - "/tils.json?sql=*"

      # Multi-parameter table/API URLs on the other database areas
      - "/content/*?*&*"
      - "/content/*.json?*&*"
      - "/docs-index/*?*&*"
      - "/docs-index/*.json?*&*"
      - "/dogsheep-index/*?*&*"
      - "/dogsheep-index/*.json?*&*"
      - "/simon-blog/*?*&*"
      - "/simon-blog/*.json?*&*"
      - "/tils/*?*&*"
      - "/tils/*.json?*&*"
    exclude_patterns:
      - "/content/feed.atom"
      - "/global-power-plants/global-power-plants.json"
    cookie_max_age: 86400
  datasette-ip-rate-limit:
    debug: true
    max_keys: 10000
    exempt_paths:
    - "/static/*"
    - "/-/turnstile*"
    rules:
    - name: public-demo-multi-parameter-table-pages
      paths:
      - "/global-power-plants/*"
      - "/legislators/*"
      window_seconds: 60
      max_requests: 60
      block_seconds: 20
settings:
  sql_time_limit_ms: 2000
